services:
  postgres:
    image: postgres:16-alpine
    container_name: xdouglas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: xdouglas
      POSTGRES_USER: xdouglas
      POSTGRES_PASSWORD: xdouglas_dev_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U xdouglas -d xdouglas']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
